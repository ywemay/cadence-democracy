<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Map — Cadence Democracy</title>
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .layout { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

        /* Peer list */
        .peer-list { display: flex; flex-direction: column; gap: 12px; }
        .peer-list h2 { margin: 0 0 4px 0; font-size: 1rem; }

        .peer-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 6px; padding: 16px;
        }
        .peer-card.local { border-color: var(--blue); }
        .peer-card.quarantined { border-color: #482323; background: #1c1212; }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .card-header h3 { margin: 0; font-size: 0.9rem; }
        .badge-online { font-size: 0.7rem; font-weight: bold; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; background: rgba(35,134,54,0.15); color: var(--green); border: 1px solid var(--green); }
        .badge-quarantined { font-size: 0.7rem; font-weight: bold; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; background: rgba(218,54,55,0.15); color: var(--red); border: 1px solid var(--red); }
        .badge-local { font-size: 0.7rem; font-weight: bold; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid var(--blue); }
        .peer-card p { margin: 4px 0; font-size: 0.8rem; color: var(--muted); }
        .peer-card .coords { font-family: monospace; font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
        .peer-card .voters { font-size: 0.8rem; margin-top: 6px; }
        .quarantine-alert {
            background: #2b1414; border: 1px solid var(--red);
            color: #ff9494; padding: 8px; border-radius: 4px;
            font-size: 0.75rem; margin-top: 8px;
        }

        /* Map */
        .map-container { border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
        #map { height: 520px; width: 100%; background: #090c10; }

        /* Leaflet dark overrides */
        .leaflet-container { font-family: inherit; }
        .leaflet-popup-content-wrapper { background: var(--card); color: var(--text); border-radius: 6px; }
        .leaflet-popup-content { margin: 12px 16px; }
        .leaflet-popup-content h3 { margin: 0 0 4px 0; font-size: 0.9rem; }
        .leaflet-popup-content p { margin: 2px 0; font-size: 0.8rem; color: var(--muted); }
        .leaflet-popup-tip { background: var(--card); }
        .leaflet-control-zoom a { background: var(--card); color: var(--text); border-color: var(--border); }
        .leaflet-control-zoom a:hover { background: #1c2533; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🗺️ Network Map</h1>
        <p style="margin: 4px 0 0 0; font-size: 0.8rem; color: var(--muted);">Cadence Barn Federation — Live Topology</p>
    </div>
    <div class="nav-links">
        <a href="/">📋 Proposals</a>
        <a href="/network-map.html" class="active">🗺️ Network</a>
        <a href="/notifications.html">🔔 Alerts</a>
        <a href="/recovery.html">🔑 Recovery</a>
    </div>
</header>

<div class="status-bar" id="statusBar">
    <span>⏳ Loading topology...</span>
</div>

<div class="layout">
    <section class="peer-list" id="peerList">
        <h2>Barn Nodes</h2>
        <p style="color:var(--muted);font-size:0.85rem;" id="peerCount"></p>
        <div id="peerCards"><p style="color:var(--muted);">Loading...</p></div>
    </section>

    <section class="map-container">
        <div id="map"></div>
    </section>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map;
let markers = [];
let topologyData = null;

function initMap(center, nodes) {
    map = L.map('map', {
        center: center,
        zoom: 7,
        zoomControl: true,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        subdomains: 'abcd'
    }).addTo(map);
}

function buildPopup(node, isLocal) {
    const status = isLocal ? 'LOCAL' : node.status;
    const coordStr = node.coordinates
        ? `${node.coordinates.lat.toFixed(4)}, ${node.coordinates.lng.toFixed(4)}`
        : '—';
    const voters = node.ledger_metrics
        ? `<p>👥 ${node.ledger_metrics.verified_voter_pool.toLocaleString()} verified voters</p>`
        : '';
    const sync = node.last_sync_timestamp
        ? `<p>🔄 ${node.last_sync_timestamp}</p>`
        : '';
    return `
        <h3>${node.node_id}</h3>
        <p>📍 ${node.physical_location || '—'}</p>
        <p>📌 ${coordStr}</p>
        ${voters}
        ${sync}
        <p><strong>${status}</strong></p>
    `;
}

function getMarkerColor(status, isLocal) {
    if (isLocal) return '#58a6ff';
    if (status === 'ONLINE') return '#3fb950';
    if (status === 'QUARANTINED') return '#da3637';
    return '#8b949e';
}

function createColoredIcon(color) {
    return L.divIcon({
        html: `<svg width="28" height="40" viewBox="0 0 28 40"><path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.3 21.7 0 14 0z" fill="${color}" stroke="#fff" stroke-width="1.5"/><circle cx="14" cy="14" r="5" fill="#fff"/></svg>`,
        className: '',
        iconSize: [28, 40],
        iconAnchor: [14, 40],
        popupAnchor: [0, -36]
    });
}

function plotNodes(data) {
    if (!map) return;

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const bounds = [];

    // Plot local node
    const local = data.topology.local_node;
    if (local.coordinates) {
        const color = getMarkerColor(null, true);
        const m = L.marker([local.coordinates.lat, local.coordinates.lng], {
            icon: createColoredIcon(color)
        }).addTo(map);
        m.bindPopup(buildPopup(local, true));
        markers.push(m);
        bounds.push([local.coordinates.lat, local.coordinates.lng]);
    }

    // Plot peers
    (data.topology.network_peers || []).forEach(peer => {
        if (!peer.coordinates) return;
        const color = getMarkerColor(peer.status, false);
        const m = L.marker([peer.coordinates.lat, peer.coordinates.lng], {
            icon: createColoredIcon(color)
        }).addTo(map);
        m.bindPopup(buildPopup(peer, false));
        markers.push(m);
        bounds.push([peer.coordinates.lat, peer.coordinates.lng]);
    });

    // Fit bounds so all markers are visible
    if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 8 });
    }
}

function renderPeerCards(data) {
    const container = document.getElementById('peerCards');
    const local = data.topology.local_node;
    const peers = data.topology.network_peers || [];
    const activeCount = peers.filter(p => p.status === 'ONLINE').length;

    document.getElementById('peerCount').textContent =
        `${peers.length} peers · ${activeCount} online`;

    let html = '';

    // Local node card
    const lc = local.coordinates;
    html += `
        <div class="peer-card local">
            <div class="card-header">
                <h3>${local.node_id}</h3>
                <span class="badge badge-local">Local Core</span>
            </div>
            <p>📍 ${local.physical_location || '—'}</p>
            <div class="coords">${lc ? `${lc.lat}, ${lc.lng}` : '—'}</div>
        </div>
    `;

    // Peer cards
    peers.forEach(peer => {
        const c = peer.coordinates;
        const sync = peer.last_sync_timestamp
            ? `<p>🔄 ${new Date(peer.last_sync_timestamp).toLocaleString()}</p>` : '';
        const voters = peer.ledger_metrics
            ? `<div class="voters">👥 ${peer.ledger_metrics.verified_voter_pool.toLocaleString()} voters</div>` : '';
        const quarantine = peer.status === 'QUARANTINED' && peer.quarantine_reason
            ? `<div class="quarantine-alert">${peer.quarantine_reason}</div>` : '';

        html += `
            <div class="peer-card ${peer.status === 'QUARANTINED' ? 'quarantined' : ''}">
                <div class="card-header">
                    <h3>${peer.peer_id}</h3>
                    <span class="badge ${peer.status === 'ONLINE' ? 'badge-online' : 'badge-quarantined'}">${peer.status}</span>
                </div>
                <p>📍 ${peer.physical_location || '—'}</p>
                <div class="coords">${c ? `${c.lat}, ${c.lng}` : '—'}</div>
                ${sync}
                ${voters}
                ${quarantine}
            </div>
        `;
    });

    container.innerHTML = html;
}

async function loadTopology() {
    const statusBar = document.getElementById('statusBar');
    try {
        const res = await fetch('/api/network/topology');
        if (!res.ok) {
            statusBar.innerHTML = '<span style="color:var(--red);">⚠️ Network topology unavailable</span>';
            return;
        }
        const data = await res.json();
        topologyData = data;

        statusBar.innerHTML = `
            <span>🟢 Network: <strong>${data.health}</strong> healthy</span>
            <span>📡 ${data.metrics.active} active · ${data.metrics.quarantined} quarantined</span>
            <span>🕐 ${new Date(data.timestamp).toLocaleString()}</span>
        `;

        renderPeerCards(data);

        // Find center — average of all coordinates
        const allCoords = [];
        const local = data.topology.local_node;
        if (local.coordinates) allCoords.push(local.coordinates);
        (data.topology.network_peers || []).forEach(p => {
            if (p.coordinates) allCoords.push(p.coordinates);
        });

        if (allCoords.length > 0) {
            const avgLat = allCoords.reduce((s, c) => s + c.lat, 0) / allCoords.length;
            const avgLng = allCoords.reduce((s, c) => s + c.lng, 0) / allCoords.length;
            initMap([avgLat, avgLng], allCoords);
        } else {
            initMap([20, 77], []); // center of India fallback
        }
        plotNodes(data);

    } catch (e) {
        statusBar.innerHTML = `<span style="color:var(--red);">⚠️ Failed to load: ${e.message}</span>`;
    }
}

loadTopology();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts — Cadence Democracy</title>
    <link rel="stylesheet" href="/styles/base.css">
    <style>
        #toastContainer {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 12px;
            width: 350px; max-width: 90vw;
        }
        .toast-card {
            background: var(--card); border: 1px solid var(--border);
            border-left: 5px solid var(--blue); border-radius: 6px; padding: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: slideIn 0.3s cubic-bezier(0.18,0.89,0.32,1.28) forwards;
        }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-card.success { border-left-color: var(--green); }
        .toast-card.warning { border-left-color: var(--yellow); }
        .toast-card.danger { border-left-color: var(--red); }
        .toast-header {
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 0.95rem; margin-bottom: 6px;
        }
        .toast-body { font-size: 0.85rem; color: var(--muted); line-height: 1.4; }

        .hub {
            max-width: 800px; margin: 0 auto;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 6px; padding: 20px;
        }
        .hub h2 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .hub .subtitle { color: var(--muted); font-size: 0.9rem; margin: 0 0 20px 0; }

        .ticker-stream {
            display: flex; flex-direction: column; gap: 6px;
            max-height: 380px; overflow-y: auto;
            border: 1px solid var(--border); border-radius: 4px;
            background: #090c10; padding: 10px; margin-top: 16px;
        }
        .stream-entry {
            font-family: monospace; font-size: 0.8rem;
            padding: 6px 8px; border-bottom: 1px solid #21262d;
            display: flex; justify-content: space-between;
        }
        .stream-entry:last-child { border-bottom: none; }
        .stream-entry .tag { font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; background: #21262d; }

        .test-tools {
            margin-top: 20px; padding: 14px; border: 1px dashed var(--border);
            border-radius: 4px;
        }
        .test-tools summary { cursor: pointer; color: var(--muted); font-size: 0.8rem; }
        .test-tools .btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .test-tools button {
            background: #21262d; border: 1px solid var(--border);
            color: var(--text); padding: 6px 10px; border-radius: 4px;
            cursor: pointer; font-size: 0.8rem;
        }
        .test-tools button:hover { background: #30363d; }
        .test-tools .count { color: var(--muted); font-size: 0.75rem; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="toastContainer"></div>

    <header>
        <div>
            <h1>🔔 Live Alerts</h1>
            <p style="margin:4px 0 0 0;font-size:0.8rem;color:var(--muted);">Real-time event stream from the barn node</p>
        </div>
        <div class="nav-links">
            <a href="/">📋 Proposals</a>
            <a href="/network-map.html">🗺️ Network</a>
            <a href="/notifications.html" class="active">🔔 Alerts</a>
            <a href="/recovery.html">🔑 Recovery</a>
        </div>
    </header>

    <div class="hub">
        <h2>📡 Event Stream</h2>
        <p class="subtitle">Votes, proposals, and network activity as they happen.</p>

        <div id="connectionStatus" style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--muted);margin-bottom:10px;">
            <span id="statusDot" style="width:8px;height:8px;border-radius:50%;background:var(--yellow);display:inline-block;"></span>
            <span id="statusText">Connecting...</span>
        </div>

        <div class="ticker-stream" id="logStream">
            <div class="stream-entry" style="color:var(--muted);font-style:italic;">
                Awaiting events...
            </div>
        </div>

        <details class="test-tools">
            <summary>🔧 Test tools (simulate events)</summary>
            <div class="btns">
                <button onclick="mockEvent('vote')">🗳️ Mock Vote</button>
                <button onclick="mockEvent('proposal')">📝 Mock Proposal</button>
                <button onclick="mockEvent('quarantine')">🚨 Mock Quarantine</button>
            </div>
            <div class="count"><span id="eventCount">0</span> events received this session</div>
        </details>
    </div>

    <script>
    let eventCount = 0;

    function spawnToast(title, message, classification) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast-card ' + classification;
        toast.innerHTML = `
            <div class="toast-header">
                <span>${title}</span>
                <span style="font-size:0.75rem;color:var(--muted);cursor:pointer;" onclick="this.parentElement.parentElement.remove()">✕</span>
            </div>
            <div class="toast-body">${message}</div>
        `;
        container.appendChild(toast);
        setTimeout(() => { if (toast.parentElement) toast.remove(); }, 6000);
    }

    function appendToStream(action, detail, tag, color) {
        const stream = document.getElementById('logStream');
        if (stream.children.length === 1 && stream.children[0].style.fontStyle === 'italic') {
            stream.innerHTML = '';
        }
        const ts = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.className = 'stream-entry';
        entry.style.color = color || 'var(--text)';
        entry.innerHTML = `<span style="color:var(--muted);">[${ts}]</span> <span><strong>${action}</strong> ${detail}</span> <span class="tag">${tag || 'live'}</span>`;
        stream.insertBefore(entry, stream.firstChild);
        eventCount++;
        document.getElementById('eventCount').textContent = eventCount;
    }

    function updateConnectionStatus(connected) {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        if (connected) {
            dot.style.background = 'var(--green)';
            text.textContent = 'Connected — live';
            text.style.color = 'var(--green)';
        } else {
            dot.style.background = 'var(--red)';
            text.textContent = 'Disconnected';
            text.style.color = 'var(--red)';
        }
    }

    // SSE subscription
    function connectSSE() {
        const evtSource = new EventSource('/api/events');

        evtSource.addEventListener('connected', () => {
            updateConnectionStatus(true);
            appendToStream('SYSTEM', 'SSE connection established', 'info', 'var(--blue)');
        });

        evtSource.addEventListener('vote-cast', (e) => {
            const data = JSON.parse(e.data);
            const direction = data.vote_type === 'PRO' ? '👍 YES' : '👎 NO';
            spawnToast('🗳️ Vote Cast', `${data.user_id} voted ${direction} on proposal #${data.proposal_id}`, 'success');
            appendToStream('VOTE', `#${data.proposal_id} · ${data.user_id} → ${direction}`, 'vote', 'var(--green)');
        });

        evtSource.addEventListener('proposal-created', (e) => {
            const data = JSON.parse(e.data);
            const preview = data.text.length > 60 ? data.text.substring(0, 60) + '...' : data.text;
            spawnToast('📝 New Proposal', `#${data.id} by ${data.proposer}: ${preview}`, 'info');
            appendToStream('PROPOSAL', `#${data.id} · ${data.proposer}: "${preview}"`, 'proposal', 'var(--blue)');
        });

        evtSource.onerror = () => {
            updateConnectionStatus(false);
            appendToStream('SYSTEM', 'SSE connection lost — retrying...', 'error', 'var(--red)');
        };
    }

    // Mock events for testing
    const mockUsers = ['alpha','beta','gamma','delta','epsilon','zeta','eta','theta','iota','kappa'];
    const mockTexts = [
        'Build a community well in the northern district',
        'Install speed bumps on Market Road',
        'Fund school breakfast program for one year',
        'Plant 200 trees along the riverbank',
        'Establish a weekly waste collection route'
    ];

    function mockEvent(type) {
        if (type === 'vote') {
            const user = mockUsers[Math.floor(Math.random() * mockUsers.length)];
            const propId = 101 + Math.floor(Math.random() * 5);
            const dir = Math.random() > 0.5 ? 'PRO' : 'CON';
            const label = dir === 'PRO' ? '👍 YES' : '👎 NO';
            spawnToast('🗳️ Vote Cast (mock)', `${user} voted ${label} on #${propId}`, 'success');
            appendToStream('VOTE', `#${propId} · ${user} → ${label}`, 'mock', 'var(--green)');
        } else if (type === 'proposal') {
            const user = mockUsers[Math.floor(Math.random() * mockUsers.length)];
            const text = mockTexts[Math.floor(Math.random() * mockTexts.length)];
            const id = 200 + Math.floor(Math.random() * 100);
            spawnToast('📝 New Proposal (mock)', `#${id} by ${user}: ${text}`, 'info');
            appendToStream('PROPOSAL', `#${id} · ${user}: "${text}"`, 'mock', 'var(--blue)');
        } else if (type === 'quarantine') {
            const nodes = ['barn_01_gujarat','barn_02_madhya_pradesh','barn_03_goa'];
            const node = nodes[Math.floor(Math.random() * nodes.length)];
            spawnToast('🚨 Node Quarantine (mock)', `${node} flagged for audit failure`, 'danger');
            appendToStream('QUARANTINE', `${node} — automated audit failure`, 'mock', 'var(--red)');
        }
        eventCount++;
        document.getElementById('eventCount').textContent = eventCount;
    }

    connectSSE();
    </script>
</body>
</html>
